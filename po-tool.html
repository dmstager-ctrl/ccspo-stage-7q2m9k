<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Crestmark PO Tool - Staging</title>
<link rel="manifest" href="po-tool-manifest.json">
<meta name="theme-color" content="#101C36">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PO Tool">
<style>
  html,body{margin:0;padding:0;height:100%;background:#101C36;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#fff;text-align:center;padding:24px;}
  .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.25);border-top-color:#5ca3ff;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
  <div class="wrap"><div class="spinner"></div><p>Loading&hellip;</p></div>
  <script>
    if(sessionStorage.getItem('cx_unlocked') === '1'){
      location.replace('crestmark-client-portal.html?view=po_tool');
    } else {
      location.replace('index.html');
    }
  </script>
</body>
</html>
